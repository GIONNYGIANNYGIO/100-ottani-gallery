name: Auto Update Home Gallery

on:
  schedule:
    - cron: '*/30 * * * *'  # ogni 30 minuti
  workflow_dispatch:

jobs:
  update-gallery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch images and create JSON
        run: |
          curl "https://api.unsplash.com/search/photos?query=jdm+tuning+night+street&per_page=10&client_id=1yLiYWVhE_HAY7MxFPGo3B4-9WfzmWj1R-VPaBTbNVA" > unsplash.json

          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('unsplash.json'));
          
          const output = data.results.map(img => ({
            img: img.urls.regular,
            url: img.links.html,
            title: img.alt_description || 'JDM',
            author: img.user.name,
            date: img.created_at
          }));

          fs.writeFileSync('home-gallery.json', JSON.stringify(output, null, 2));
          "

      - name: Commit changes
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add home-gallery.json
          git commit -m "update gallery" || echo "no changes"
          git push
