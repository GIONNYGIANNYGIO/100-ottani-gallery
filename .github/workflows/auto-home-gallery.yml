name: Auto Update Home Gallery

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Fetch RAW HTML
        run: curl -L https://100ottaniplease.com/pages/visual > page.html

      - name: Debug HTML
        run: head -100 page.html

      - name: Extract REAL images (fallback)
        run: |
          grep -o 'https://[^"]*\.\(jpg\|jpeg\|png\)' page.html | head -10 > imgs.txt

      - name: Build JSON
        run: |
          echo "[" > home-gallery.json
          while read url; do
            echo "  {\"img\":\"$url\",\"title\":\"JDM\",\"date\":\"$(date +%F)\",\"url\":\"$url\"}," >> home-gallery.json
          done < imgs.txt
          sed -i '$ s/,$//' home-gallery.json
          echo "]" >> home-gallery.json

      - name: Commit
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add home-gallery.json
          git commit -m "auto update" || echo "no changes"
          git push
