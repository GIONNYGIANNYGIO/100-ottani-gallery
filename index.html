<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Gallery Archive | 100 Ottani Please!™ | JDM & Racing Culture</title>
    <meta name="description" content="Esplora l'archivio visivo di 100 Ottani Please!™. Una collezione in tempo reale di cultura JDM, tuning estremo e street racing globale.">
    <meta name="keywords" content="JDM, Tuning, Street Racing, 100 Ottani, Car Culture, Gallery, Automotive Photography">
    <meta name="author" content="100 Ottani Please!™">
    
    <meta property="og:title" content="Gallery Archive | 100 Ottani Please!™">
    <meta property="og:description" content="Archivio fotografico continuo della cultura JDM globale.">
    <meta property="og:type" content="website">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        @font-face {
            font-family: 'Monument Extended';
            src: url('https://fonts.cdnfonts.com/s/19595/MonumentExtended-Ultrabold.woff');
            font-weight: 800;
        }

        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            color: #fff;
            overflow-x: hidden;
            font-family: 'JetBrains Mono', monospace;
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
        }

        /* ROOT & MARGINS */
        #ottani-archive-root {
            width: 100%;
            padding: 0 30px;
            box-sizing: border-box;
            --accent: #FFFF00;
        }

        @media (max-width: 768px) { #ottani-archive-root { padding: 0 15px; } }

        /* HEADER SECTION (ADAPTED FROM BLACKTOP SESSIONS) */
        .bt-magazine-header { 
            padding-top: 100px; 
            padding-bottom: 40px; 
            display: flex; 
            flex-direction: column; 
        }

        .bt-brand-stack { 
            width: 100%; 
            margin-bottom: 40px; 
            overflow: hidden;
        }

        .bt-title-main, .bt-title-outline { 
            font-family: 'Monument Extended', sans-serif !important;
            font-size: clamp(4rem, 12vw, 11rem); 
            font-weight: 900; 
            line-height: 0.85; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            display: block;
            white-space: nowrap;
        }

        .bt-title-main { color: #ffffff; }

        .bt-title-outline { 
            color: transparent; 
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.3); 
            margin-top: 5px;
        }

        .bt-full-divider { 
            width: 100%; 
            height: 1px; 
            background: rgba(255, 255, 255, 0.1); 
            margin-bottom: 30px; 
        }

        .bt-editorial-text { 
            font-size: 11px; 
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.5); 
            text-transform: uppercase; 
            text-align: right !important; 
            max-width: 520px;
            margin-left: auto !important;
            letter-spacing: 2px;
            margin-top: 0;
        }

        .bt-editorial-text b { color: var(--accent); font-weight: 800; }

        /* MOSAIC GRID SYSTEM */
        .jdm-ss-mosaic { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            grid-auto-rows: 300px;
            gap: 15px;
            grid-auto-flow: row;
        } 

        .jdm-ss-card {
            background: #000; border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none; display: flex; flex-direction: column;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); position: relative; overflow: hidden;
            backface-visibility: hidden; will-change: border-color;
        }

        .jdm-ss-card:hover { border-color: var(--accent); z-index: 10; }
        
        .jdm-ss-media { width: 100%; height: 100%; overflow: hidden; background: #000; }
        .jdm-ss-media img { 
            width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); 
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            will-change: filter, transform;
        }

        /* INFO BODY - SLIDE UP */
        .jdm-ss-body {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 18px; box-sizing: border-box; background: #0a0a0a;
            transform: translateY(100%); opacity: 0;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 3;
            will-change: transform, opacity;
        }

        .jdm-ss-meta-header { display: flex; justify-content: space-between; font-size: 8px; color: #555; text-transform: uppercase; margin-bottom: 6px; }
        .jdm-ss-title { font-family: 'Monument Extended', sans-serif !important; font-size: 10px; color: #fff; margin: 0; text-transform: uppercase; line-height: 1.2; }
        .jdm-ss-info-row { display: flex; justify-content: space-between; font-size: 8px; color: #777; text-transform: uppercase; margin: 10px 0; }
        
        .jdm-ss-footer { 
            display: flex; justify-content: space-between; align-items: center; 
            border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; 
        }
        
        /* TAGS & ACTIONS */
        .jdm-ss-tags { display: flex; gap: 6px; overflow: hidden; }
        .jdm-ss-tag { font-size: 8px; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        
        .jdm-ss-action { font-size: 9px; color: #444; font-weight: 900; display: flex; align-items: center; gap: 4px; transition: 0.3s; }
        .minimal-arrow { 
            width: 10px; height: 10px; stroke: currentColor; stroke-width: 3; fill: none; 
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* HOVER BAR */
        .jdm-ss-bar { 
            position: absolute; bottom: 0; left: 0; width: 0; height: 3px; 
            background: var(--accent); transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); 
        }

        /* HOVER STATES */
        .jdm-ss-card:hover .jdm-ss-body { transform: translateY(0); opacity: 1; }
        .jdm-ss-card:hover img { filter: brightness(0.3) grayscale(1); transform: scale(1.05); }
        .jdm-ss-card:hover .jdm-ss-action { color: var(--accent); }
        .jdm-ss-card:hover .minimal-arrow { transform: translate(2px, -2px); }
        .jdm-ss-card:hover .jdm-ss-bar { width: 100%; }

        /* GRID PATTERNS */
        .full { grid-column: span 12; }
        .wide { grid-column: span 8; }
        .narrow { grid-column: span 4; }

        /* RESPONSIVE */
        @media (max-width: 1024px) { 
            .jdm-ss-mosaic { grid-auto-rows: 350px; }
            [class*="wide"], [class*="narrow"], [class*="full"] { grid-column: span 12 !important; } 
            .bt-title-main, .bt-title-outline { font-size: 12.5vw !important; }
            .bt-magazine-header { padding-top: 50px; }
        }
    </style>
</head>
<body>

<div id="ottani-archive-root">
    <header class="bt-magazine-header">
        <div class="bt-brand-stack">
            <h1 class="bt-title-main">GALLERY</h1>
            <h1 class="bt-title-outline">ARCHIVE</h1>
        </div>
        <div class="bt-full-divider"></div>
        <p class="bt-editorial-text">
            CURATED <b>JDM VISUAL ARCHIVE</b>, EXPLORING GLOBAL <b>CAR CULTURE</b><br>
    THROUGH CONTINUOUS <b>AUTOMOTIVE DOCUMENTATION</b>.
        </p>
    </header>

    <main class="jdm-ss-mosaic" id="jdm-engine-grid"></main>
    
    <div id="jdm-load-more-trigger" style="height: 80px; display: flex; align-items: center; justify-content: center;">
        <span style="font-size: 8px; color: #222; letter-spacing: 4px;">SCANNING DATABASE...</span>
    </div>
</div>

<script>
(function() {
    const KEYS = { 
        U: "1yLiYWVhE_HAY7MxFPGo3B4-9WfzmWj1R-VPaBTbNVA", 
        P: "2xbI4WF3YWnE66DEPr6gEJCNh4iuMyknemXRxw8WAanVE3kSMflm0KmD" 
    };
    
    let page = 1, fetching = false, counter = 0;

    const patternA = ['full', 'wide', 'narrow', 'narrow', 'wide', 'full', 'wide', 'narrow', 'narrow', 'wide'];
    const patternB = [...patternA].reverse();

    function generateTags(title) {
        if (!title) return ['#JDM', '#CORE'];
        const commonWords = ['A', 'THE', 'OF', 'IN', 'WITH', 'AND', 'PHOTO', 'IMAGE', 'SOME', 'BLACK'];
        const words = title.toUpperCase()
            .replace(/[^A-Z\s]/g, '')
            .split(' ')
            .filter(w => w.length > 3 && !commonWords.includes(w));
        return words.length > 0 ? words.slice(0, 3).map(w => `#${w}`) : ['#JDM', '#STREET'];
    }

    async function load() {
        if (fetching) return; fetching = true;
        try {
            const q = "jdm performance tuning cars street night city";
            const res = await Promise.allSettled([
                fetch(`https://api.unsplash.com/search/photos?page=${page}&query=${q}&per_page=10&client_id=${KEYS.U}`).then(r => r.json()),
                fetch(`https://api.pexels.com/v1/search?query=${q}&per_page=10&page=${page}`, {headers:{Authorization:KEYS.P}}).then(r => r.json())
            ]);

            const grid = document.getElementById('jdm-engine-grid');
            
            res.forEach((r, i) => {
                if (r.status === 'fulfilled') {
                    const data = i === 0 ? (r.value.results || []) : (r.value.photos || []);
                    data.forEach(item => {
                        const title = (i === 0 ? (item.alt_description || item.description) : item.alt) || "JDM VISUAL ARCHIVE";
                        const tags = generateTags(title);
                        grid.appendChild(createCard({
                            img: i === 0 ? item.urls.regular + "&q=80&w=1200" : item.src.large,
                            title: title,
                            author: i === 0 ? item.user.name : item.photographer,
                            source: i === 0 ? "UNSPLASH" : "PEXELS",
                            url: i === 0 ? item.links.html : item.url,
                            tags: tags
                        }));
                    });
                }
            });
            page++;
        } catch (err) {
            console.error("Archive fetch error:", err);
        } finally { fetching = false; }
    }

    function createCard(d) {
        const pattern = (Math.floor(counter / 10) % 2 === 0) ? patternA : patternB;
        const style = pattern[counter % 10];
        counter++;

        const a = document.createElement('a');
        a.className = `jdm-ss-card ${style}`;
        a.href = d.url; 
        a.target = "_blank";
        a.rel = "noopener noreferrer";

        const tagsHtml = d.tags.map(t => `<span class="jdm-ss-tag">${t}</span>`).join('');

        a.innerHTML = `
            <div class="jdm-ss-media">
                <img src="${d.img}" alt="${d.title}" loading="lazy" decoding="async">
            </div>
            <div class="jdm-ss-body">
                <div class="jdm-ss-meta-header">
                    <span>${d.source}</span>
                    <span>17/04/2026</span>
                </div>
                <h2 class="jdm-ss-title">${d.title}</h2>
                <div class="jdm-ss-info-row">
                    <span>AUTH: ${d.author.substring(0, 15)}</span>
                    <span>Tag: VERIFIED</span>
                </div>
                <div class="jdm-ss-footer">
                    <div class="jdm-ss-tags">${tagsHtml}</div>
                    <div class="jdm-ss-action">
                        VIEW 
                        <svg class="minimal-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <line x1="7" y1="17" x2="17" y2="7"></line>
                            <polyline points="7 7 17 7 17 17"></polyline>
                        </svg>
                    </div>
                </div>
                <div class="jdm-ss-bar"></div>
            </div>
        `;
        return a;
    }

    const observer = new IntersectionObserver(e => { 
        if(e[0].isIntersecting) load(); 
    }, { rootMargin: '400px' });
    
    observer.observe(document.getElementById('jdm-load-more-trigger'));
    
    let resizeTimer;
    const sync = () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            window.parent.postMessage({ type: 'resize', height: document.documentElement.scrollHeight }, '*');
        }, 200);
    };
    new ResizeObserver(sync).observe(document.body);

    load();
})();
</script>
</body>
</html>
