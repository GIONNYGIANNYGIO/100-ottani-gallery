<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Archive | 100 Ottani Please!™</title>
    <script type="application/ld+json" id="jdm-schema-data">
    {
      "@context": "https://schema.org",
      "@type": "ImageGallery",
      "name": "100 Ottani JDM Gallery Archive",
      "description": "Curated JDM Visual Archive, exploring global car culture.",
      "url": "https://tuosito.com",
      "image": []
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        @font-face {
            font-family: 'Monument Extended';
            src: url('https://fonts.cdnfonts.com/s/19595/MonumentExtended-Ultrabold.woff');
            font-weight: 800;
        }

        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            color: #fff;
            overflow-x: hidden;
            font-family: 'JetBrains Mono', monospace;
            -webkit-font-smoothing: antialiased;
        }

        #ottani-archive-root {
            width: 100%;
            min-height:100vh;
            padding: 0 30px;
            box-sizing: border-box;
            --accent: #FFFF00;
        }

        @media (max-width: 768px) { #ottani-archive-root { padding: 0 15px; } }

        /* HEADER MAGAZINE */
        .bt-magazine-header { padding: 100px 0 40px; display: flex; flex-direction: column; }
        .bt-brand-stack { width: 100%; margin-bottom: 40px; overflow: hidden; }
        .bt-title-main, .bt-title-outline { 
            font-family: 'Monument Extended', sans-serif !important;
            font-size: clamp(4rem, 12vw, 11rem); font-weight: 900; line-height: 0.85; margin: 0; 
            text-transform: uppercase; letter-spacing: 1px; display: block; white-space: nowrap;
        }
        .bt-title-main { color: #ffffff; }
        .bt-title-outline { color: transparent; -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.3); margin-top: 5px; }
        .bt-full-divider { width: 100%; height: 1px; background: rgba(255, 255, 255, 0.1); margin-bottom: 30px; }
        .bt-editorial-text { 
            font-size: 11px; line-height: 1.8; color: rgba(255, 255, 255, 0.5); 
            text-transform: uppercase; text-align: right !important; max-width: 520px;
            margin-left: auto !important; letter-spacing: 2px;
        }
        .bt-editorial-text b { color: var(--accent); font-weight: 800; }

        /* GRID & CARDS */
        .jdm-ss-mosaic { display: grid; grid-template-columns: repeat(12, 1fr); grid-auto-rows: 300px; gap: 15px; } 
        .jdm-ss-card {
            background: #000; border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none; display: flex; flex-direction: column;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); position: relative; overflow: hidden;
            will-change: transform, border-color;
        }
        .jdm-ss-card:hover { border-color: var(--accent); z-index: 10; }
        .jdm-ss-media { width: 100%; height: 100%; overflow: hidden; }
        .jdm-ss-media img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); }

        .jdm-ss-body {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 18px; box-sizing: border-box; background: #0a0a0a;
            transform: translateY(100%); opacity: 0;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); z-index: 3;
            will-change: transform, opacity;
        }
        .jdm-ss-card:hover .jdm-ss-body { transform: translateY(0); opacity: 1; }
        .jdm-ss-card:hover img { filter: brightness(0.3) grayscale(1); transform: scale(1.05); }

        /* INFO & FOOTER */
        .jdm-ss-meta-header { display: flex; justify-content: space-between; font-size: 8px; color: #555; text-transform: uppercase; margin-bottom: 6px; }
        .jdm-ss-title { font-family: 'Monument Extended', sans-serif !important; font-size: 10px; color: #fff; margin: 0; text-transform: uppercase; line-height: 1.2; }
        .jdm-ss-info-row { display: flex; justify-content: space-between; font-size: 8px; color: #777; text-transform: uppercase; margin: 10px 0; }
        .jdm-ss-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }

        /* ALLINEAMENTO FRECCIA */
        .arrow-link { display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 900; color: #555; transition: 0.3s cubic-bezier(0.19, 1, 0.22, 1); line-height: 1; }
        .arrow-icon { 
            width: 10px; height: 10px; stroke: currentColor; stroke-width: 4; fill: none; 
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); will-change: transform;
            transform: translateY(1.5px); 
        }
        
        .jdm-ss-card:hover .arrow-link { color: var(--accent); }
        .jdm-ss-card:hover .arrow-icon { transform: translate(3px, -1.5px); }

        .jdm-ss-tag-container { display: flex; gap: 8px; flex-wrap: wrap; }
        .jdm-ss-tag { font-size: 8px; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        .jdm-ss-bar { position: absolute; bottom: 0; left: 0; width: 0; height: 3px; background: var(--accent); transition: 0.5s; }
        .jdm-ss-card:hover .jdm-ss-bar { width: 100%; }

        .full { grid-column: span 12; }
        .wide { grid-column: span 8; }
        .narrow { grid-column: span 4; }

        @media (max-width: 1024px) { [class*="wide"], [class*="narrow"], [class*="full"] { grid-column: span 12 !important; } }
    /* LOADER FULL PAGE */
#jdm-page-loader{
    position:absolute;
    inset:0;
    min-height:100vh;
    width:100%;
    background:#111214;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    transition:opacity 0.6s ease;
}

.jdm-loader-text{
    display:none;
}

#jdm-page-loader.hide{
    opacity:0;
    pointer-events:none;
}
        .jdm-spinner{
    width:50px;
    height:50px;
    border:3px solid rgba(255,255,255,0.1);
    border-top:3px solid #FFFF00;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}
    </style>
</head>
<body>
    <div id="jdm-page-loader">
  <div class="jdm-spinner"></div>
</div>
    <div id="ottani-archive-root">
        <header class="bt-magazine-header">
            <div class="bt-brand-stack">
                <h1 class="bt-title-main">VISUAL</h1>
                <h1 class="bt-title-outline">OVERDRIVE</h1>
            </div>
            <div class="bt-full-divider"></div>
            <p class="bt-editorial-text">CURATED <b>JDM VISUAL ARCHIVE</b>, EXPLORING GLOBAL <b>CAR CULTURE</b><br>
    THROUGH CONTINUOUS <b>DIGITAL DOCUMENTATION</b></p>
        </header>
        <main class="jdm-ss-mosaic" id="jdm-engine-grid"></main>
        <div id="jdm-load-more-trigger" style="height: 100px;"></div>
    </div>

    <script>
    (function() {
        const KEYS = { U: "1yLiYWVhE_HAY7MxFPGo3B4-9WfzmWj1R-VPaBTbNVA", P: "2xbI4WF3YWnE66DEPr6gEJCNh4iuMyknemXRxw8WAanVE3kSMflm0KmD", PX: "55464526-8c1ed1d759c73669d0c1f38ab" };
        let page = 1, fetching = false, counter = 0;
        const patternA = ['full', 'wide', 'narrow', 'narrow', 'wide', 'full', 'wide', 'narrow', 'narrow', 'wide'];
        const patternB = [...patternA].reverse();

        // SEO Schema Reference
        const schemaElement = document.getElementById('jdm-schema-data');
        let schema = { image: [] };
        if (schemaElement && schemaElement.innerText) {
            try { schema = JSON.parse(schemaElement.innerText); } catch(e) {}
        }

        function updateSchema(data) {
            if (!schemaElement) return;
            schema.image.push({
                "@type": "ImageObject",
                "contentUrl": data.img,
                "name": data.title,
                "author": {
                    "@type": "Person",
                    "name": data.author
                }
            });
            schemaElement.innerText = JSON.stringify(schema);
        }

        // DATE HELPERS
        function formatDate(dateInput) {
            if (!dateInput) return "00/00/0000";
            const d = new Date(dateInput);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function getRealisticDate() {
            const start = new Date(2024, 0, 1);
            const end = new Date();
            const randomDate = new Date(start.getTime() + Math.random() * (end.getTime() - start.getTime()));
            return formatDate(randomDate);
        }

        function getTags(title) {
            if (!title) return ['#JDM'];
            return title.replace(/_/g, ' ').replace(/[^a-zA-Z0-9 ]/g, '').split(/\s+/).filter(w => w.length > 3).slice(0, 3).map(w => `#${w.toUpperCase()}`);
        }

        async function load() {
            if (fetching) return; fetching = true;
            try {
                const q = "jdm tuning night street";
                const res = await Promise.allSettled([
                    fetch(`https://api.unsplash.com/search/photos?page=${page}&query=${q}&per_page=8&client_id=${KEYS.U}`).then(r => r.json()),
                    fetch(`https://api.pexels.com/v1/search?query=${q}&per_page=8&page=${page}`, {headers:{Authorization:KEYS.P}}).then(r => r.json()),
                    fetch(`https://pixabay.com/api/?key=${KEYS.PX}&q=${encodeURIComponent(q)}&page=${page}&per_page=8`).then(r => r.json())
                ]);

                const grid = document.getElementById('jdm-engine-grid');
                const frag = document.createDocumentFragment();

                res.forEach((r, idx) => {
                    if (r.status !== 'fulfilled') return;
                    let items = (idx === 0) ? r.value.results : (idx === 1) ? r.value.photos : r.value.hits;
                    (items || []).forEach(item => {
                        let d = {};
                        
                        // Extracting actual dates or generating realistic ones for the infinite scroll
                        if (idx === 0) {
                            d = { source: 'UNSPLASH', title: item.alt_description || "JDM CULTURE", author: item.user.name, img: item.urls.regular, url: item.links.html, date: formatDate(item.created_at) };
                        } else if (idx === 1) {
                            d = { source: 'PEXELS', title: item.alt || "STREET RACING", author: item.photographer, img: item.src.large, url: item.url, date: getRealisticDate() };
                        } else {
                            d = { source: 'PIXABAY', title: item.tags || "TUNING ARCHIVE", author: item.user, img: item.webformatURL, url: item.pageURL, date: getRealisticDate() };
                        }
                        
                        updateSchema(d);
                        frag.appendChild(createCard(d));
                    });
                });
                
                grid.appendChild(frag);
                page++;
                window.parent.postMessage({ type: 'resize', height: document.documentElement.scrollHeight }, '*');
            } catch (e) {} finally { fetching = false; }
        }

        function createCard(d) {
            const style = (Math.floor(counter / 10) % 2 === 0 ? patternA : patternB)[counter % 10];
            counter++;
            const tags = getTags(d.title);
            const tagHTML = tags.map(t => `<span class="jdm-ss-tag">${t}</span>`).join('');

            const article = document.createElement('article');
            article.className = `jdm-ss-card ${style}`;
            article.innerHTML = `
                <a href="${d.url}" target="_blank" style="text-decoration:none; color:inherit; display:block; height:100%;">
                    <div class="jdm-ss-media"><img src="${d.img}" loading="lazy" alt="${d.title}"></div>
                    <div class="jdm-ss-body">
                        <div class="jdm-ss-meta-header"><span>${d.source}</span><span>REF: ${Math.floor(Math.random()*9000)}</span></div>
                        <h2 class="jdm-ss-title">${d.title.substring(0, 35)}</h2>
                        <div class="jdm-ss-info-row"><span>AUTH: ${d.author.substring(0, 15)}</span><span>${d.date}</span></div>
                        <div class="jdm-ss-footer">
                            <div class="jdm-ss-tag-container">${tagHTML}</div>
                            <div class="arrow-link">
                                <span>VIEW</span>
                                <svg class="arrow-icon" viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                            </div>
                        </div>
                        <div class="jdm-ss-bar"></div>
                    </div>
                </a>`;
            return article;
        }

        const obs = new IntersectionObserver(e => { if(e[0].isIntersecting) load(); }, { rootMargin: '400px' });
        obs.observe(document.getElementById('jdm-load-more-trigger'));
        load();
        // 👇 INCOLLA QUESTO QUI SOTTO
setTimeout(() => {
    const loader = document.getElementById('jdm-page-loader');
    if(loader){
        loader.classList.add('hide');
        setTimeout(()=>loader.remove(), 600);
    }
}, 800);
    })();
</script>
</body>
</html>
