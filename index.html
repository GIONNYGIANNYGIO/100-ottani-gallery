<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        @font-face {
            font-family: 'Monument Extended';
            src: url('https://fonts.cdnfonts.com/s/19595/MonumentExtended-Ultrabold.woff');
            font-weight: 800;
        }

        :root { --accent: #FFFF00; --bg: transparent; }

        html, body {
            margin: 0; padding: 0;
            background: var(--bg) !important;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden; /* Fondamentale: disabilita lo scroll interno all'iframe */
            -webkit-font-smoothing: antialiased;
        }

        #ottani-container { width: 100%; padding: 0; box-sizing: border-box; }

        /* HEADER STYLE */
        .header-section { padding: 60px 20px 40px; }
        .title-stack h1 {
            font-family: 'Monument Extended', sans-serif !important;
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.8; margin: 0; text-transform: uppercase;
            letter-spacing: -3px;
        }
        .subtitle { 
            font-size: 10px; color: rgba(255,255,255,0.4); 
            letter-spacing: 2px; margin-top: 20px; text-transform: uppercase;
        }

        /* MOSAIC GRID */
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); grid-auto-rows: 350px; gap: 15px; padding: 20px; }

        /* CARD ARCHITECTURE */
        .card {
            background: #050505; border: 1px solid rgba(255,255,255,0.05);
            position: relative; overflow: hidden; transition: border-color 0.4s;
            text-decoration: none; color: inherit;
        }
        .card:hover { border-color: var(--accent); }
        .card img { 
            width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5);
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); opacity: 0;
        }
        .card:hover img { filter: brightness(0.2) grayscale(1); transform: scale(1.05); }

        /* OVERLAY & ARROW */
        .card-content {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: flex-end; padding: 25px;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            transform: translateY(15px); opacity: 0; transition: 0.4s;
        }
        .card:hover .card-content { transform: translateY(0); opacity: 1; }

        .card-title { font-family: 'Monument Extended', sans-serif; font-size: 11px; margin-bottom: 15px; }

        .card-footer { 
            display: flex; justify-content: space-between; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;
        }

        /* VIEW + DYNAMIC ARROW */
        .view-action {
            display: flex; align-items: center; gap: 10px;
            font-size: 9px; font-weight: 800; color: var(--accent);
        }
        .arrow-icon {
            width: 14px; height: 14px; fill: none; stroke: currentColor; 
            stroke-width: 2.5; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover .arrow-icon { transform: rotate(-45deg) translate(2px, -2px); }

        /* RESPONSIVE LAYOUTS */
        .full { grid-column: span 12; }
        .wide { grid-column: span 8; }
        .narrow { grid-column: span 4; }

        @media (max-width: 900px) {
            .grid { grid-auto-rows: 300px; padding: 10px; gap: 10px; }
            [class*="wide"], [class*="narrow"] { grid-column: span 12; }
        }
    </style>
</head>
<body>

<div id="ottani-container">
    <header class="header-section">
        <div class="title-stack"><h1>GALLERY</h1><h1>ARCHIVE</h1></div>
        <div class="subtitle">Continuous Street Culture Documentation // Core Database</div>
    </header>

    <main class="grid" id="main-grid"></main>
    <div id="sentinel" style="height: 20px;"></div>
</div>

<script>
    const grid = document.getElementById('main-grid');
    const pattern = ['full', 'wide', 'narrow', 'narrow', 'wide', 'full'];
    let images = [];
    let index = 0;
    let counter = 0;

    // Funzione cruciale per comunicare l'altezza a Fourthwall
    function reportHeight() {
        const height = document.getElementById('ottani-container').offsetHeight;
        window.parent.postMessage({ type: 'resize', height: height }, '*');
    }

    async function loadGallery() {
        try {
            const r = await fetch('gallery.json');
            images = await r.json();
            renderNext();
        } catch (e) { console.error("Database error", e); }
    }

    function renderNext() {
        const chunk = images.slice(index, index + 10);
        chunk.forEach(img => {
            const layout = pattern[counter % pattern.length];
            counter++;
            const article = document.createElement('a');
            article.href = img.url;
            article.target = "_blank";
            article.className = `card ${layout}`;
            article.innerHTML = `
                <img src="${img.url}" onload="this.style.opacity=1">
                <div class="card-content">
                    <div class="card-title">DATA_REF // ${Math.floor(Math.random()*9999)}</div>
                    <div class="card-footer">
                        <span style="font-size:8px; color:#666;">SOURCE: ${img.date || 'DATABASE'}</span>
                        <div class="view-action">
                            VIEW <svg class="arrow-icon" viewBox="0 0 24 24"><path d="M7 17L17 7M17 7H7M17 7V17"/></svg>
                        </div>
                    </div>
                </div>`;
            grid.appendChild(article);
        });
        index += 10;
        
        // Aspetta un istante che il DOM si aggiorni e invia l'altezza
        setTimeout(reportHeight, 300);
    }

    // Infinite scroll
    const observer = new IntersectionObserver(entries => {
        if(entries[0].isIntersecting && images.length > 0) renderNext();
    }, { rootMargin: '400px' });
    
    observer.observe(document.getElementById('sentinel'));

    // Monitora i cambiamenti di dimensione (es. immagini che caricano)
    const ro = new ResizeObserver(reportHeight);
    ro.observe(document.getElementById('ottani-container'));

    initGallery = loadGallery();
</script>
</body>
</html>
