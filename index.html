<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Ottani Please!™ | JDM Archive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        @font-face {
            font-family: 'Monument Extended';
            src: url('https://fonts.cdnfonts.com/s/19595/MonumentExtended-Ultrabold.woff');
            font-weight: 800;
        }

        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            color: #fff;
            overflow-x: hidden;
            font-family: 'JetBrains Mono', monospace;
        }

        #ottani-archive-root {
            width: 100%;
            padding: 0 30px;
            box-sizing: border-box;
            --accent: #FFFF00;
        }

        @media (max-width: 768px) { #ottani-archive-root { padding: 0 15px; } }

        /* HEADER */
        .bt-magazine-header { padding-top: 80px; padding-bottom: 50px; display: flex; flex-direction: column; }
        .bt-brand-stack { margin-bottom: 35px; }
        .bt-title-main, .bt-title-outline { 
            font-family: 'Monument Extended', sans-serif !important;
            font-size: clamp(3.5rem, 11vw, 10rem); font-weight: 900; line-height: 0.82; margin: 0; text-transform: uppercase; letter-spacing: -2px;
        }
        .bt-title-main { color: #ffffff; }
        .bt-title-outline { color: transparent; -webkit-text-stroke: 1.2px rgba(255, 255, 255, 0.25); margin-top: 4px; }
        .bt-full-divider { width: 100%; height: 1px; background: rgba(255, 255, 255, 0.1); margin-bottom: 25px; }
        .bt-editorial-text { font-size: 11px; color: rgba(255, 255, 255, 0.45); text-transform: uppercase; text-align: right; letter-spacing: 1.5px; }

        /* GRID SYSTEM - PATTERN FISSO ANTI-BUCO */
        .jdm-ss-mosaic { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            grid-auto-rows: 280px; 
            gap: 15px; 
        } 

        /* CARD STYLE */
        .jdm-ss-card {
            background: #000; border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none; display: flex; flex-direction: column;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); position: relative; overflow: hidden;
        }
        .jdm-ss-card:hover { border-color: var(--accent); z-index: 5; }

        .jdm-ss-media { position: relative; width: 100%; height: 100%; overflow: hidden; background: #000; }
        .jdm-ss-media img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); }

        /* INFO BODY - SOLO HOVER */
        .jdm-ss-body {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 18px; box-sizing: border-box; background: #0a0a0a;
            transform: translateY(100%); opacity: 0;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex; flex-direction: column; z-index: 3;
        }

        .jdm-ss-meta-header { display: flex; justify-content: space-between; font-size: 9px; color: #555; text-transform: uppercase; margin-bottom: 8px; }
        .jdm-ss-title { font-family: 'Monument Extended', sans-serif !important; font-size: 11px; color: #fff; margin: 0; text-transform: uppercase; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .jdm-ss-info-row { display: flex; justify-content: space-between; font-size: 9px; color: #777; text-transform: uppercase; margin: 12px 0 8px 0; }

        .jdm-ss-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .jdm-ss-tags { display: flex; gap: 6px; }
        .jdm-ss-tag { font-size: 8px; color: var(--accent); font-weight: 800; }
        .jdm-ss-action { display: flex; align-items: center; gap: 6px; }
        .jdm-ss-view-text { font-size: 10px; color: #444; font-weight: 900; }
        .jdm-ss-arrow { color: #444; transition: 0.4s; }

        /* INTERACTION */
        .jdm-ss-card:hover .jdm-ss-body { transform: translateY(0); opacity: 1; }
        .jdm-ss-card:hover img { filter: brightness(0.3) grayscale(1); transform: scale(1.05); }
        .jdm-ss-card:hover .jdm-ss-view-text { color: var(--accent); }
        .jdm-ss-card:hover .jdm-ss-arrow { color: var(--accent); transform: translate(3px, -3px); }

        /* REGOLE INCASTRO (Somma sempre 12) */
        .type-a { grid-column: span 8; }
        .type-b { grid-column: span 4; }
        .type-c { grid-column: span 4; grid-row: span 2; }
        .type-d { grid-column: span 8; grid-row: span 2; }

        @media (max-width: 1024px) { [class*="type-"] { grid-column: span 6 !important; grid-row: span 1 !important; height: 380px; } }
        @media (max-width: 768px) { [class*="type-"] { grid-column: span 12 !important; height: 450px; } }
    </style>
</head>
<body>

<div id="ottani-archive-root">
    <header class="bt-magazine-header">
        <div class="bt-brand-stack">
            <h1 class="bt-title-main">GALLERY</h1>
            <h1 class="bt-title-outline">ARCHIVE</h1>
        </div>
        <div class="bt-full-divider"></div>
        <p class="bt-editorial-text">REAL-TIME <b>JDM VISUALS</b></p>
    </header>

    <main class="jdm-ss-mosaic" id="jdm-engine-grid"></main>
    <div id="jdm-load-more-trigger" style="height: 100px;"></div>
</div>

<script>
(function() {
    const KEYS = { U: "1yLiYWVhE_HAY7MxFPGo3B4-9WfzmWj1R-VPaBTbNVA", P: "2xbI4WF3YWnE66DEPr6gEJCNh4iuMyknemXRxw8WAanVE3kSMflm0KmD" };
    let page = 1, fetching = false, counter = 0;

    // Pattern matematico fisso: garantisce riempimento totale riga per riga
    const patternClasses = ['type-a', 'type-b', 'type-c', 'type-a', 'type-b', 'type-b', 'type-d', 'type-b'];

    function getDynamicTags(text) {
        if(!text) return ['#JDM', '#CORE'];
        const words = text.toLowerCase().replace(/[^\w\s]/gi, '').split(' ').filter(w => w.length > 3);
        return [...new Set(words)].slice(0, 3).map(w => `#${w.toUpperCase()}`);
    }

    async function load() {
        if (fetching) return; fetching = true;
        try {
            const q = "jdm tuning car street night city";
            const res = await Promise.allSettled([
                fetch(`https://api.unsplash.com/search/photos?page=${page}&query=${q}&client_id=${KEYS.U}`).then(r => r.json()),
                fetch(`https://api.pexels.com/v1/search?query=${q}&per_page=12&page=${page}`, {headers:{Authorization:KEYS.P}}).then(r => r.json())
            ]);

            const grid = document.getElementById('jdm-engine-grid');
            res.forEach((r, i) => {
                if (r.status === 'fulfilled') {
                    const data = i === 0 ? (r.value.results || []) : (r.value.photos || []);
                    data.forEach(item => {
                        const dateObj = new Date(i === 0 ? item.created_at : new Date());
                        grid.appendChild(createCard({
                            img: i === 0 ? item.urls.regular : item.src.large,
                            title: (i === 0 ? (item.alt_description || item.description) : item.alt) || "JDM VISUAL",
                            author: i === 0 ? item.user.name : item.photographer,
                            source: i === 0 ? "UNSPLASH" : "PEXELS",
                            url: i === 0 ? item.links.html : item.url,
                            date: dateObj.toLocaleDateString('it-IT'),
                            tags: getDynamicTags(i === 0 ? item.alt_description : item.alt)
                        }));
                    });
                }
            });
            page++;
        } finally { fetching = false; }
    }

    function createCard(d) {
        const style = patternClasses[counter % patternClasses.length];
        counter++;

        const a = document.createElement('a');
        a.className = `jdm-ss-card ${style}`;
        a.href = d.url; a.target = "_blank";

        a.innerHTML = `
            <div class="jdm-ss-media"><img src="${d.img}" alt="${d.title}" loading="lazy"></div>
            <div class="jdm-ss-body">
                <div class="jdm-ss-meta-header"><span>SOURCE: ${d.source}</span><span>${d.date}</span></div>
                <h2 class="jdm-ss-title">${d.title}</h2>
                <div class="jdm-ss-info-row"><span>AUTHOR: ${d.author}</span><span>STATUS: VERIFIED</span></div>
                <div class="jdm-ss-footer">
                    <div class="jdm-ss-tags">${d.tags.map(t => `<span class="jdm-ss-tag">${t}</span>`).join('')}</div>
                    <div class="jdm-ss-action">
                        <span class="jdm-ss-view-text">VIEW</span>
                        <svg class="jdm-ss-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="jdm-ss-bar"></div>
        `;
        return a;
    }

    const trigger = new IntersectionObserver(e => { if(e[0].isIntersecting) load(); });
    trigger.observe(document.getElementById('jdm-load-more-trigger'));

    const syncHeight = () => { window.parent.postMessage({ type: 'resize', height: document.documentElement.scrollHeight }, '*'); };
    new ResizeObserver(syncHeight).observe(document.body);
    load();
})();
</script>
</body>
</html>
