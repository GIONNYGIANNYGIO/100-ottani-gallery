<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>100 Octane Gallery - Tuning Cars</title>
<meta name="description" content="Dynamic gallery of real tuning cars. JDM, drift, stance and street culture.">

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
    margin:0;
    background:transparent;
    font-family:'JetBrains Mono', monospace;
    color:#fff;
}

/* CONTAINER */
.jdm-ss-container {
    padding:0 30px;
}

/* GRID */
.jdm-ss-mosaic {
    display:grid;
    grid-template-columns: repeat(12,1fr);
    grid-auto-rows:250px;
    gap:15px;
}

/* TILES */
.jdm-tile-tall { grid-column: span 4; grid-row: span 2; }
.jdm-tile-wide { grid-column: span 8; }
.jdm-tile-sm   { grid-column: span 4; }

/* CARD */
.jdm-ss-card {
    border:1px solid rgba(255,255,255,0.08);
    overflow:hidden;
    position:relative;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    background:transparent;
}

.jdm-ss-card:hover {
    border-color:#FFFF00;
}

/* IMAGE */
.jdm-ss-media {
    width:100%;
    height:100%;
}

.jdm-ss-media img {
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.6);
    transition:0.6s;
}

/* OVERLAY INFO */
.jdm-ss-body {
    position:absolute;
    bottom:0;
    width:100%;
    padding:20px;

    background:linear-gradient(
        to top,
        rgba(0,0,0,0.95) 0%,
        rgba(0,0,0,0.85) 40%,
        rgba(0,0,0,0.0) 100%
    );

    min-height:120px;

    display:flex;
    flex-direction:column;
    justify-content:flex-end;

    opacity:0;
    transform:translateY(30px);
    transition:0.4s cubic-bezier(0.19, 1, 0.22, 1);
}

/* SHOW ON HOVER */
.jdm-ss-card:hover .jdm-ss-body {
    opacity:1;
    transform:translateY(0);
}

/* META */
.jdm-ss-meta-row {
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:5px;
    font-size:10px;
    color:#aaa;
}

/* FOOTER */
.jdm-ss-footer {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
}

/* TAGS */
.jdm-ss-tags-row {
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

.jdm-ss-chip {
    font-size:10px;
    color:#FFFF00;
    font-weight:800;
}

/* ACTION */
.jdm-ss-action {
    display:flex;
    align-items:center;
    gap:6px;
}

.jdm-ss-btn {
    font-size:10px;
    color:#777;
    font-weight:800;
}

.jdm-ss-arrow {
    color:#555;
    transition:0.3s;
}

/* HOVER EFFECT */
.jdm-ss-card:hover img {
    transform:scale(1.1);
    filter:brightness(0.3);
}

.jdm-ss-card:hover .jdm-ss-arrow {
    color:#FFFF00;
    transform:translate(3px,-3px);
}

/* BOTTOM BAR */
.jdm-ss-bar {
    position:absolute;
    bottom:0;
    left:0;
    height:3px;
    width:0;
    background:#FFFF00;
    transition:0.4s;
}

.jdm-ss-card:hover .jdm-ss-bar {
    width:100%;
}

/* LOADER */
.loader-container {
    width:100%;
    display:flex;
    justify-content:center;
    padding:40px 0;
}

.spinner {
    width:30px;
    height:30px;
    border:3px solid rgba(255,255,255,0.1);
    border-top-color:#FFFF00;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* MOBILE */
@media (max-width:1024px){
    [class*="jdm-tile-"] {
        grid-column: span 6 !important;
        grid-row: span 1 !important;
    }
}

@media (max-width:768px){
    .jdm-ss-container {
        padding:0 15px;
    }
    .jdm-ss-mosaic {
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="jdm-ss-container">
    <div id="jdm-social-engine" class="jdm-ss-mosaic"></div>

    <!-- LOADER -->
    <div id="loader" class="loader-container">
        <div class="spinner"></div>
    </div>
</div>

<script>

// TAGS
function generateTags(url) {
    url = url.toLowerCase();
    const tags = [];

    if(url.includes("jdm")) tags.push("JDM");
    if(url.includes("drift")) tags.push("DRIFT");
    if(url.includes("stance")) tags.push("STANCE");
    if(url.includes("wide")) tags.push("WIDEBODY");
    if(url.includes("bmw")) tags.push("BMW");
    if(url.includes("nissan")) tags.push("NISSAN");

    if(tags.length === 0) tags.push("TUNING");

    return tags.slice(0,3);
}

async function loadGallery(){
    const res = await fetch("gallery.json");
    const data = await res.json();

    const grid = document.getElementById("jdm-social-engine");
    const loader = document.getElementById("loader");

    let index = 0;
    const BATCH = 20;

    function renderBatch() {
        const fragment = document.createDocumentFragment();

        for (let i = 0; i < BATCH && index < data.length; i++, index++) {

            const img = data[index];
            const tags = generateTags(img.url);

            const source = img.date || "";
            const author = img.author || "Unknown";

            const tileType = index % 4 === 0 ? "jdm-tile-tall" :
                             index % 4 === 1 ? "jdm-tile-wide" : "jdm-tile-sm";

            const card = document.createElement("a");
            card.href = img.url;
            card.target = "_blank";
            card.className = `jdm-ss-card ${tileType}`;

            card.innerHTML = `
                <div class="jdm-ss-media">
                    <img src="${img.url}" loading="lazy" alt="tuning car ${tags.join(", ")}">
                </div>

                <div class="jdm-ss-body">
                    <div class="jdm-ss-meta-row">
                        <span>Author: ${author}</span>
                        <span>Source: ${source}</span>
                    </div>

                    <div class="jdm-ss-footer">
                        <div class="jdm-ss-tags-row">
                            ${tags.map(t => `<span class="jdm-ss-chip">#${t}</span>`).join("")}
                        </div>

                        <div class="jdm-ss-action">
                            <span class="jdm-ss-btn">OPEN</span>
                            <svg class="jdm-ss-arrow" viewBox="0 0 24 24" width="16" fill="none" stroke="currentColor" stroke-width="3">
                                <line x1="7" y1="17" x2="17" y2="7"></line>
                                <polyline points="7 7 17 7 17 17"></polyline>
                            </svg>
                        </div>
                    </div>

                    <div class="jdm-ss-bar"></div>
                </div>
            `;

            fragment.appendChild(card);
        }

        grid.appendChild(fragment);

        if (index < data.length) {
            requestAnimationFrame(renderBatch);
        } else {
            loader.style.display = "none"; // 🔥 hide loader
        }
    }

    renderBatch();
}

loadGallery();

</script>

</body>
</html>
