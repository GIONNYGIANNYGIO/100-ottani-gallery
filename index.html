<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>100 Octane Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
    margin:0;
    background:transparent;
    font-family:'JetBrains Mono', monospace;
    color:#fff;
}

/* CONTAINER */
.jdm-ss-container {
    padding:0 30px;
}

/* GRID */
.jdm-ss-mosaic {
    display:grid;
    grid-template-columns: repeat(12,1fr);
    grid-auto-rows:250px;
    gap:15px;
}

/* TILES */
.jdm-tile-tall { grid-column: span 4; grid-row: span 2; }
.jdm-tile-wide { grid-column: span 8; }
.jdm-tile-sm   { grid-column: span 4; }

/* CARD */
.jdm-ss-card {
    border:1px solid rgba(255,255,255,0.08);
    overflow:hidden;
    position:relative;
    text-decoration:none;
    display:flex;
    background:transparent;
}

.jdm-ss-card:hover { border-color:#FFFF00; }

/* IMAGE */
.jdm-ss-media img {
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(0.6);
    transition:0.6s;
}

/* OVERLAY */
.jdm-ss-body {
    position:absolute;
    bottom:0;
    width:100%;
    padding:20px;

    background:linear-gradient(to top, rgba(0,0,0,0.95), transparent);
    min-height:120px;

    display:flex;
    flex-direction:column;
    justify-content:flex-end;

    opacity:0;
    transform:translateY(30px);
    transition:0.4s;
}

.jdm-ss-card:hover .jdm-ss-body {
    opacity:1;
    transform:translateY(0);
}

/* META */
.jdm-ss-meta-row {
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    font-size:10px;
    color:#aaa;
}

/* FOOTER */
.jdm-ss-footer {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
}

.jdm-ss-tags-row {
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

.jdm-ss-chip {
    font-size:10px;
    color:#FFFF00;
    font-weight:800;
}

/* ACTION */
.jdm-ss-action {
    display:flex;
    align-items:center;
    gap:6px;
}

.jdm-ss-arrow {
    color:#555;
    transition:0.3s;
}

.jdm-ss-card:hover img {
    transform:scale(1.1);
    filter:brightness(0.3);
}

.jdm-ss-card:hover .jdm-ss-arrow {
    color:#FFFF00;
    transform:translate(3px,-3px);
}

/* BAR */
.jdm-ss-bar {
    position:absolute;
    bottom:0;
    left:0;
    height:3px;
    width:0;
    background:#FFFF00;
    transition:0.4s;
}

.jdm-ss-card:hover .jdm-ss-bar {
    width:100%;
}

/* LOADER */
.loader {
    width:100%;
    display:flex;
    justify-content:center;
    padding:40px 0;
}

.spinner {
    width:30px;
    height:30px;
    border:3px solid rgba(255,255,255,0.1);
    border-top-color:#FFFF00;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* MOBILE */
@media (max-width:1024px){
    [class*="jdm-tile-"] {
        grid-column: span 6 !important;
        grid-row: span 1 !important;
    }
}

@media (max-width:768px){
    .jdm-ss-container { padding:0 15px; }
    .jdm-ss-mosaic { grid-template-columns:1fr; }
}

</style>
</head>

<body>

<div class="jdm-ss-container">
    <div id="grid" class="jdm-ss-mosaic"></div>

    <!-- LOADER -->
    <div id="loader" class="loader">
        <div class="spinner"></div>
    </div>

    <!-- TRIGGER -->
    <div id="trigger" style="height:50px;"></div>
</div>

<script>

function generateTags(url){
    url = url.toLowerCase();
    const t = [];

    if(url.includes("jdm")) t.push("JDM");
    if(url.includes("drift")) t.push("DRIFT");
    if(url.includes("stance")) t.push("STANCE");
    if(url.includes("wide")) t.push("WIDEBODY");

    if(t.length === 0) t.push("TUNING");

    return t.slice(0,3);
}

let data = [];
let index = 0;
const STEP = 20;
let loading = false;

async function init(){
    const res = await fetch("gallery.json");
    data = await res.json();
    loadMore();
}

function loadMore(){
    if(loading) return;
    loading = true;

    const grid = document.getElementById("grid");
    const loader = document.getElementById("loader");

    loader.style.display = "flex";

    setTimeout(() => {

        const fragment = document.createDocumentFragment();

        for(let i=0; i<STEP && index < data.length; i++, index++){

            const img = data[index];
            const tags = generateTags(img.url);

            const card = document.createElement("a");
            card.href = img.url;
            card.target = "_blank";

            const tile = index % 4 === 0 ? "jdm-tile-tall" :
                         index % 4 === 1 ? "jdm-tile-wide" : "jdm-tile-sm";

            card.className = `jdm-ss-card ${tile}`;

            card.innerHTML = `
                <div class="jdm-ss-media">
                    <img src="${img.url}" loading="lazy">
                </div>

                <div class="jdm-ss-body">
                    <div class="jdm-ss-meta-row">
                        <span>Author: ${img.author || "Unknown"}</span>
                        <span>Source: ${img.date || ""}</span>
                    </div>

                    <div class="jdm-ss-footer">
                        <div class="jdm-ss-tags-row">
                            ${tags.map(t => `<span class="jdm-ss-chip">#${t}</span>`).join("")}
                        </div>

                        <div class="jdm-ss-action">
                            <svg class="jdm-ss-arrow" viewBox="0 0 24 24" width="16" fill="none" stroke="currentColor" stroke-width="3">
                                <line x1="7" y1="17" x2="17" y2="7"></line>
                                <polyline points="7 7 17 7 17 17"></polyline>
                            </svg>
                        </div>
                    </div>

                    <div class="jdm-ss-bar"></div>
                </div>
            `;

            fragment.appendChild(card);
        }

        grid.appendChild(fragment);

        loader.style.display = "none";
        loading = false;

    }, 300); // smooth feel
}

// SCROLL TRIGGER
const observer = new IntersectionObserver(entries => {
    if(entries[0].isIntersecting && index < data.length){
        loadMore();
    }
});

observer.observe(document.getElementById("trigger"));

init();

</script>

</body>
</html>
