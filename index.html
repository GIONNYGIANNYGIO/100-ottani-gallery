<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Ottani Please!™ - Archive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        @font-face {
            font-family: 'Monument Extended';
            src: url('https://fonts.cdnfonts.com/s/19595/MonumentExtended-Ultrabold.woff');
            font-weight: 800;
        }

        /* RESET & TRASPARENZA */
        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            color: #fff;
            overflow-x: hidden;
            font-family: 'JetBrains Mono', monospace;
        }

        /* MARGINI RICHIESTI: 30px Desktop / 15px Mobile */
        #ottani-archive-root {
            width: 100%;
            padding: 0 30px;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            #ottani-archive-root { padding: 0 15px; }
        }

        /* HEADER */
        .bt-magazine-header { padding-top: 60px; padding-bottom: 50px; display: flex; flex-direction: column; }
        .bt-title-main, .bt-title-outline { 
            font-family: 'Monument Extended', sans-serif !important;
            font-size: clamp(3rem, 10vw, 9rem); font-weight: 900; line-height: 0.85; margin: 0; text-transform: uppercase;
        }
        .bt-title-outline { color: transparent; -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.3); }
        .bt-editorial-text { font-size: 11px; text-align: right; max-width: 520px; margin-left: auto; color: rgba(255,255,255,0.5); }
        .bt-editorial-text b { color: #FFFF00; }

        /* GRID */
        .jdm-ss-mosaic { display: grid; grid-template-columns: repeat(12, 1fr); grid-auto-rows: 250px; gap: 15px; width: 100%; }
        
        /* CARD DESIGN */
        .jdm-ss-card {
            background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none; display: flex; flex-direction: column;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative; overflow: hidden; height: 100%;
            opacity: 0; transform: translateY(20px);
        }
        .jdm-ss-card.loaded { opacity: 1; transform: translateY(0); }
        .jdm-ss-card:hover { border-color: #FFFF00; }

        .jdm-ss-media { width: 100%; height: 100%; overflow: hidden; background: #000; flex-grow: 1; transition: 0.5s; }
        .jdm-ss-media img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.6); transition: 0.8s; }

        .jdm-ss-body { padding: 20px; background: #0a0a0a; height: 110px; transition: 0.5s; display: flex; flex-direction: column; }
        .jdm-ss-meta-row { display: flex; justify-content: space-between; font-size: 9px; color: #666; margin-bottom: 8px; }
        .jdm-ss-title { font-family: 'Monument Extended', sans-serif !important; font-size: 12px; color: #fff; margin: 0; text-transform: uppercase; }

        /* DETTAGLI HOVER */
        .jdm-ss-desc { font-size: 10px; color: #888; max-height: 0; opacity: 0; overflow: hidden; transition: 0.4s; text-transform: uppercase; }
        .jdm-ss-desc strong { color: #FFFF00; }

        .jdm-ss-card:hover .jdm-ss-media { height: 40%; flex-grow: 0; }
        .jdm-ss-card:hover .jdm-ss-body { height: 60%; }
        .jdm-ss-card:hover .jdm-ss-desc { max-height: 120px; opacity: 1; margin: 10px 0; }
        .jdm-ss-card:hover img { filter: brightness(0.3) blur(2px); }

        .jdm-ss-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .jdm-ss-btn { font-size: 10px; color: #555; font-weight: 900; }
        .jdm-ss-card:hover .jdm-ss-btn { color: #FFFF00; }
        .jdm-ss-bar { position: absolute; bottom: 0; left: 0; width: 0; height: 3px; background: #FFFF00; transition: 0.5s; }
        .jdm-ss-card:hover .jdm-ss-bar { width: 100%; }

        /* TILES */
        .jdm-tile-tall { grid-column: span 4; grid-row: span 2; }
        .jdm-tile-wide { grid-column: span 8; grid-row: span 1; }
        .jdm-tile-sm   { grid-column: span 4; grid-row: span 1; }

        @media (max-width: 1024px) { .jdm-ss-mosaic { grid-template-columns: 1fr; grid-auto-rows: auto; } [class*="jdm-tile-"] { grid-column: span 1 !important; height: 400px; } }
    </style>
</head>
<body>

<div id="ottani-archive-root">
    <header class="bt-magazine-header">
        <h1 class="bt-title-main">GALLERY</h1>
        <h1 class="bt-title-outline">ARCHIVE</h1>
        <p class="bt-editorial-text">ARCHIVING GLOBAL <b>CAR CULTURE</b> THROUGH CONTINUOUS <b>DIGITAL MOTION</b>.</p>
    </header>

    <div class="jdm-ss-mosaic" id="jdm-social-engine"></div>
    <div id="jdm-load-more-trigger" style="height: 100px;"></div>
</div>

<script>
(function() {
    const KEYS = { UNSPLASH: "1yLiYWVhE_HAY7MxFPGo3B4-9WfzmWj1R-VPaBTbNVA", PEXELS: "2xbI4WF3YWnE66DEPr6gEJCNh4iuMyknemXRxw8WAanVE3kSMflm0KmD", PIXABAY: "55464526-8c1ed1d759c73669d0c1f38ab" };
    let currentPage = 1, isFetching = false, itemsCounter = 0;

    // RECYCLE ENGINE: Scarica le immagini non visibili
    const memoryObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const img = entry.target.querySelector('img');
            if (entry.isIntersecting) {
                if (img.dataset.src) img.src = img.dataset.src;
                entry.target.classList.add('loaded');
            } else {
                img.src = ''; // Libera RAM
            }
        });
    }, { rootMargin: '500px' });

    function createCard(imgUrl, title, author, provider, url) {
        const grid = document.getElementById('jdm-social-engine');
        const idx = itemsCounter % 4;
        const style = (idx === 0) ? 'jdm-tile-tall' : (idx === 1) ? 'jdm-tile-wide' : 'jdm-tile-sm';
        
        const a = document.createElement('a');
        a.className = `jdm-ss-card ${style}`;
        a.href = url; a.target = "_blank";
        a.innerHTML = `
            <div class="jdm-ss-media"><img data-src="${imgUrl}" src=""></div>
            <div class="jdm-ss-body">
                <div class="jdm-ss-meta-row"><span>${provider}</span><span>2026_APR</span></div>
                <h3 class="jdm-ss-title">${(title || 'JDM_VISUAL').substring(0, 20)}</h3>
                <div class="jdm-ss-desc">
                    <strong>AUTHOR:</strong> ${author}<br>
                    <strong>SOURCE:</strong> ${provider}<br>
                    <strong>STATUS:</strong> VERIFIED
                </div>
                <div class="jdm-ss-footer"><span class="jdm-ss-btn">OPEN_FILE</span><span>↗</span></div>
                <div class="jdm-ss-bar"></div>
            </div>
        `;
        grid.appendChild(a);
        memoryObserver.observe(a);
        itemsCounter++;
    }

    async function load() {
        if (isFetching) return; isFetching = true;
        const q = "jdm car tuning";
        try {
            const res = await Promise.allSettled([
                fetch(`https://api.unsplash.com/search/photos?page=${currentPage}&query=${q}&client_id=${KEYS.UNSPLASH}`).then(r => r.json()),
                fetch(`https://api.pexels.com/v1/search?query=${q}&per_page=12&page=${currentPage}`, {headers:{Authorization:KEYS.PEXELS}}).then(r => r.json())
            ]);
            res.forEach((r, i) => {
                if (r.status === 'fulfilled') {
                    const items = i === 0 ? r.value.results : r.value.photos;
                    items.forEach(img => createCard(i===0 ? img.urls.regular : img.src.large, i===0 ? img.alt_description : img.alt, i===0 ? img.user.name : img.photographer, i===0 ? 'UNSPLASH' : 'PEXELS', i===0 ? img.links.html : img.url));
                }
            });
            currentPage++;
        } finally { isFetching = false; }
    }

    const trigger = new IntersectionObserver(e => { if(e[0].isIntersecting) load(); });
    trigger.observe(document.getElementById('jdm-load-more-trigger'));

    // COMUNICAZIONE ALTEZZA
    const sendHeight = () => {
        window.parent.postMessage({ type: 'resize', height: document.documentElement.scrollHeight }, '*');
    };
    new ResizeObserver(sendHeight).observe(document.body);
    load();
})();
</script>
</body>
</html>
