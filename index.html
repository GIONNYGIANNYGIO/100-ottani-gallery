<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Ottani Please!™ - Gallery</title>
    
    <style>
        /* --- RESET GLOBALE PER L'IFRAME --- */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a; /* FORZA LO SFONDO SCURO */
            color: #fff;
            overflow-x: hidden;
        }

        /* --- FONTS --- */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');

        @font-face {
            font-family: 'Monument Extended';
            src: url('https://fonts.cdnfonts.com/s/19595/MonumentExtended-Ultrabold.woff');
            font-weight: 800;
        }

        /* --- HEADER STYLES --- */
        #coremotion-header {
            --bt-neon: #FFFF00;
            --bt-white: #ffffff;
            font-family: 'JetBrains Mono', monospace !important;
            padding: 0 30px;
        }

        .bt-magazine-header { 
            padding-top: 60px;
            padding-bottom: 50px;
            display: flex; 
            flex-direction: column;
        }

        .bt-brand-stack { 
            width: 100%; 
            margin-bottom: 40px; 
            overflow: hidden;
        }

        .bt-title-main, .bt-title-outline { 
            font-family: 'Monument Extended', sans-serif !important;
            font-size: clamp(4rem, 10vw, 9rem); 
            font-weight: 900; 
            line-height: 0.85; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            display: block;
            white-space: nowrap;
        }

        .bt-title-main { color: var(--bt-white); }
        .bt-title-outline { 
            color: transparent; 
            -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.3); 
            margin-top: 5px;
        }

        .bt-full-divider { 
            width: 100%; 
            height: 1px; 
            background: rgba(255, 255, 255, 0.1); 
            margin-bottom: 30px; 
        }

        .bt-editorial-text {
            font-size: 11px; 
            line-height: 1.8; 
            color: rgba(255, 255, 255, 0.5); 
            text-transform: uppercase; 
            text-align: right;
            max-width: 520px; 
            margin-left: auto;
            letter-spacing: 2px;
        }

        .bt-editorial-text b { color: var(--bt-neon); font-weight: 800; }

        /* --- GRID & CARDS --- */
        .jdm-ss-container { width: 100%; padding: 0 30px; box-sizing: border-box; } 
        .jdm-ss-mosaic { display: grid; grid-template-columns: repeat(12, 1fr); grid-auto-rows: 250px; gap: 15px; width: 100%; } 
        .jdm-tile-tall { grid-column: span 4; grid-row: span 2; } 
        .jdm-tile-wide { grid-column: span 8; grid-row: span 1; } 
        .jdm-tile-sm   { grid-column: span 4; grid-row: span 1; } 

        .jdm-ss-card { background:#0a0a0a; border:1px solid #1a1a1a; text-decoration:none; display:flex; flex-direction:column; transition:0.5s cubic-bezier(0.19, 1, 0.22, 1); position:relative; overflow:hidden; height: 100%; } 
        .jdm-ss-card:hover { border-color:#FFFF00; z-index:10; }

        .jdm-ss-media { position:relative; width:100%; height: 100%; overflow:hidden; background:#000; flex-grow: 1; transition: 0.5s; } 
        .jdm-ss-media img { width:100%; height:100%; object-fit:cover; filter:brightness(0.6); transition:0.8s cubic-bezier(0.19, 1, 0.22, 1); } 

        .jdm-ss-tags-top { position:absolute; top:12px; left:12px; display: flex; gap: 5px; z-index: 2; } 
        .jdm-ss-new { font-size:9px; background:#FFFF00; color:#000; padding:2px 8px; font-weight:900; }

        .jdm-ss-body { padding:20px; background: #0a0a0a; position: relative; display: flex; flex-direction: column; justify-content: space-between; height: 120px; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); font-family: 'JetBrains Mono', monospace; } 

        .jdm-ss-meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .jdm-ss-mono-meta { font-size: 9px; color: #666; font-weight: 500; }

        .jdm-ss-title { font-size:14px; font-weight:800; color:#fff; margin:0; text-transform:uppercase; line-height:1.2; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; } 

        .jdm-ss-desc { font-size:11px; color:#888; line-height:1.4; max-height:0; opacity:0; overflow:hidden; transition: 0.4s; margin: 0; display: flex; flex-direction: column; gap: 4px; }
        .jdm-ss-desc strong { color: #ccc; }

        .jdm-ss-tags-row { display: flex; gap: 8px; opacity: 0; transition: 0.4s; }
        .jdm-ss-chip { font-size: 10px; color: #FFFF00; font-weight: 900; }

        .jdm-ss-footer { display:flex; justify-content:space-between; align-items:flex-end; margin-top: auto; } 
        .jdm-ss-action { display: flex; align-items: center; gap: 8px; }
        .jdm-ss-btn { font-size:10px; color:#555; font-weight:900; transition: 0.3s; } 
        .jdm-ss-arrow { color: #555; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); }
        .jdm-ss-bar { position:absolute; bottom:0; left:0; width:0; height:4px; background:#FFFF00; transition:0.5s; } 

        /* --- HOVER EFFECTS --- */
        .jdm-ss-card:hover .jdm-ss-media { flex-grow: 0.3; }
        .jdm-ss-card:hover img { filter:brightness(0.3) scale(1.1); } 
        .jdm-ss-card:hover .jdm-ss-body { height: 220px; } 
        .jdm-ss-card:hover .jdm-ss-desc { max-height: 90px; opacity: 1; margin: 15px 0; }
        .jdm-ss-card:hover .jdm-ss-tags-row { opacity: 1; }
        .jdm-ss-card:hover .jdm-ss-bar { width:100%; } 
        .jdm-ss-card:hover .jdm-ss-btn { color:#FFFF00; }
        .jdm-ss-card:hover .jdm-ss-arrow { color:#FFFF00; transform: translate(4px, -4px); }

        /* --- LOADER --- */
        .jdm-loader-container { width: 100%; display: none; justify-content: center; padding: 40px 0; }
        .jdm-loader-container.active { display: flex; }
        .jdm-spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #FFFF00; border-radius: 50%; animation: jdm-spin 0.8s linear infinite; }
        @keyframes jdm-spin { to { transform: rotate(360deg); } }

        /* --- RESPONSIVE --- */
        @media (max-width: 1024px) { 
            [class*="jdm-tile-"] { grid-column: span 6 !important; grid-row: span 1 !important; } 
        } 

        @media (max-width: 768px) {
            #coremotion-header, .jdm-ss-container { padding-left: 15px !important; padding-right: 15px !important; }
            .bt-magazine-header { padding-top: 30px; }
            .bt-title-main, .bt-title-outline { font-size: 15vw !important; }
            .jdm-ss-mosaic { grid-template-columns: 1fr; grid-auto-rows: auto; } 
            [class*="jdm-tile-"] { grid-column: span 1 !important; }
        }
    </style>
</head>
<body>

    <section style="width: 100%;"> 

        <div id="coremotion-header">
            <header class="bt-magazine-header">
                <div class="bt-brand-stack">
                    <h1 class="bt-title-main">GALLERY</h1>
                    <h1 class="bt-title-outline">TEST</h1>
                </div>
                <div class="bt-full-divider"></div>
                <p class="bt-editorial-text">
                    REAL-TIME <b>JDM VISUALS</b>, <b>SHORT FORM PERFORMANCE</b> AND <b>STREET DRIVEN ENERGY</b>, 
                    ARCHIVING GLOBAL <b>CAR CULTURE</b> THROUGH CONTINUOUS <b>DIGITAL MOTION</b>.
                </p>
            </header>
        </div>

        <div class="jdm-ss-container"> 
            <div class="jdm-ss-mosaic" id="jdm-social-engine"></div> 
            
            <div id="jdm-loader-engine" class="jdm-loader-container">
                <div class="jdm-spinner"></div>
            </div>
            
            <div id="jdm-load-more-trigger" style="height: 50px; width: 100%;"></div>
        </div> 

    </section>

    <script> 
    (function() { 
        const KEYS = {
            UNSPLASH: "1yLiYWVhE_HAY7MxFPGo3B4-9WfzmWj1R-VPaBTbNVA",
            PEXELS: "2xbI4WF3YWnE66DEPr6gEJCNh4iuMyknemXRxw8WAanVE3kSMflm0KmD",
            PIXABAY: "55464526-8c1ed1d759c73669d0c1f38ab"
        };

        let currentPage = 1;
        let isFetching = false;
        let itemsCounter = 0;
        const LIMIT = 200;

        function filterContent(str){
            if(!str) return false;
            const blacklist = ["render", "3d", "illustration", "ai generated", "painting", "drawing"];
            return !blacklist.some(word => str.toLowerCase().includes(word));
        }

        function processTags(str){
            const defaults = ["JDM", "TUNING", "100OTTANI"];
            if(!str) return defaults;
            return str.split(/[\s,]+/).slice(0, 3).map(t => t.toUpperCase().replace(/[^A-Z]/g, ''));
        }

        function renderCard(imgUrl, title, credit, provider, originalUrl, rawDate){
            const grid = document.getElementById('jdm-social-engine');
            if(!grid) return;

            const safeTitle = title || "100 Ottani Please!™ Archive";
            const safeAuthor = credit || "Unknown Artist";
            
            let displayDate;
            if (rawDate) {
                displayDate = new Date(rawDate).toLocaleDateString('it-IT');
            } else {
                displayDate = new Date().toLocaleDateString('it-IT'); 
            }

            const tags = processTags(title);

            const card = document.createElement('a'); 
            card.href = originalUrl; 
            card.target = "_blank";  
            
            const idx = itemsCounter % 4; 
            let tileStyle = (idx === 0) ? 'jdm-tile-tall' : (idx === 1) ? 'jdm-tile-wide' : 'jdm-tile-sm';
            card.className = `jdm-ss-card ${tileStyle}`; 

            card.innerHTML = ` 
                <div class="jdm-ss-media"> 
                    <img src="${imgUrl}" alt="${safeTitle}" loading="lazy"> 
                    <div class="jdm-ss-tags-top"> 
                        <span class="jdm-ss-new">100 OTTANI</span>
                    </div>
                </div> 
                <div class="jdm-ss-body"> 
                    <div class="jdm-ss-content-top">
                        <div class="jdm-ss-meta-row">
                            <span class="jdm-ss-mono-meta">SRC_${provider.toUpperCase()}</span>
                            <span class="jdm-ss-mono-meta">${displayDate}</span>
                        </div>
                        <h3 class="jdm-ss-title">${safeTitle}</h3> 
                        
                        <div class="jdm-ss-desc">
                            <span><strong>Title:</strong> ${safeTitle.substring(0, 40)}${safeTitle.length > 40 ? '...' : ''}</span>
                            <span><strong>Author:</strong> ${safeAuthor}</span>
                            <span><strong>Date:</strong> ${displayDate}</span>
                            <span><strong>Source:</strong> ${provider}</span>
                        </div>
                    </div> 
                    
                    <div class="jdm-ss-footer"> 
                        <div class="jdm-ss-tags-row">
                            ${tags.map(tag => `<span class="jdm-ss-chip">#${tag}</span>`).join('')}
                        </div>
                        <div class="jdm-ss-action">
                            <span class="jdm-ss-btn">OPEN</span> 
                            <svg class="jdm-ss-arrow" viewBox="0 0 24 24" width="16" fill="none" stroke="currentColor" stroke-width="3">
                                <line x1="7" y1="17" x2="17" y2="7"></line>
                                <polyline points="7 7 17 7 17 17"></polyline>
                            </svg> 
                        </div>
                    </div>
                    <div class="jdm-ss-bar"></div> 
                </div> 
            `; 
            grid.appendChild(card);
            itemsCounter++;
        }

        async function fetchImages() {
            if(isFetching || itemsCounter >= LIMIT) return;
            isFetching = true;
            
            const loader = document.getElementById('jdm-loader-engine');
            if(loader) loader.classList.add('active');

            try {
                const query = "jdm car tuning modified drift";
                
                const [resU, resPe, resPi] = await Promise.allSettled([
                    fetch(\`https://api.unsplash.com/search/photos?page=\${currentPage}&query=\${query}&client_id=\${KEYS.UNSPLASH}\`).then(r => r.json()),
                    fetch(\`https://api.pexels.com/v1/search?query=\${query}&per_page=12&page=\${currentPage}\`, { headers: { Authorization: KEYS.PEXELS } }).then(r => r.json()),
                    fetch(\`https://pixabay.com/api/?key=\${KEYS.PIXABAY}&q=car+tuning+jdm&image_type=photo&page=\${currentPage}&per_page=12\`).then(r => r.json())
                ]);

                if(resU.status === 'fulfilled' && resU.value.results) {
                    resU.value.results.forEach(img => {
                        if(itemsCounter < LIMIT && filterContent(img.alt_description)) {
                            renderCard(img.urls.small, img.alt_description, img.user.name, "Unsplash", img.links.html, img.created_at);
                        }
                    });
                }

                if(resPe.status === 'fulfilled' && resPe.value.photos) {
                    resPe.value.photos.forEach(img => {
                        if(itemsCounter < LIMIT && filterContent(img.alt)) {
                            renderCard(img.src.medium, img.alt, img.photographer, "Pexels", img.url, null);
                        }
                    });
                }

                if(resPi.status === 'fulfilled' && resPi.value.hits) {
                    resPi.value.hits.forEach(img => {
                        if(itemsCounter < LIMIT && filterContent(img.tags)) {
                            renderCard(img.webformatURL, img.tags, img.user, "Pixabay", img.pageURL, null);
                        }
                    });
                }

                currentPage++;
            } catch(e) {
                console.error("Gallery Engine Error:", e);
            } finally {
                isFetching = false;
                if(loader) loader.classList.remove('active');
            }
        }

        const observer = new IntersectionObserver((entries) => {
            if(entries[0].isIntersecting) fetchImages();
        }, { threshold: 0.1 });

        const trigger = document.getElementById('jdm-load-more-trigger');
        if(trigger) observer.observe(trigger);
        
        fetchImages(); 
    })();
    </script>
</body>
</html>
