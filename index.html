<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Ottani Please!™ - Archive</title>
    <style>
        /* --- IMPORTAZIONE FONTS --- */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        @font-face {
            font-family: 'Monument Extended';
            src: url('https://fonts.cdnfonts.com/s/19595/MonumentExtended-Ultrabold.woff');
            font-weight: 800;
        }

        /* --- RESET & TRASPARENZA NATIVA --- */
        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            color: #fff;
            overflow-x: hidden;
            font-family: 'JetBrains Mono', monospace;
        }

        /* --- MARGINI RESPONSIVE (30px / 15px) --- */
        #ottani-archive-root {
            width: 100%;
            padding: 0 30px;
            box-sizing: border-box;
            --accent: #FFFF00;
        }

        @media (max-width: 768px) {
            #ottani-archive-root { padding: 0 15px; }
        }

        /* --- HEADER DESIGN --- */
        .bt-magazine-header { 
            padding-top: 80px;
            padding-bottom: 50px;
            display: flex; 
            flex-direction: column;
        }

        .bt-brand-stack { margin-bottom: 35px; overflow: hidden; }

        .bt-title-main, .bt-title-outline { 
            font-family: 'Monument Extended', sans-serif !important;
            font-size: clamp(3.5rem, 11vw, 10rem); 
            font-weight: 900; 
            line-height: 0.82; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: -2px;
        }

        .bt-title-main { color: #ffffff; }
        .bt-title-outline { 
            color: transparent; 
            -webkit-text-stroke: 1.2px rgba(255, 255, 255, 0.25); 
            margin-top: 4px;
        }

        .bt-full-divider { 
            width: 100%; 
            height: 1px; 
            background: rgba(255, 255, 255, 0.1); 
            margin-bottom: 25px; 
        }

        .bt-editorial-text {
            font-size: 11px; 
            line-height: 1.7; 
            color: rgba(255, 255, 255, 0.45); 
            text-transform: uppercase; 
            text-align: right;
            max-width: 550px; 
            margin-left: auto;
            letter-spacing: 1.5px;
        }
        .bt-editorial-text b { color: var(--accent); font-weight: 800; }

        /* --- GRID SYSTEM --- */
        .jdm-ss-mosaic { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            grid-auto-rows: 260px; 
            gap: 15px; 
            width: 100%; 
        } 

        /* --- CARD DESIGN --- */
        .jdm-ss-card {
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }
        .jdm-ss-card:hover { border-color: var(--accent); z-index: 5; }

        .jdm-ss-media { 
            position: relative; width: 100%; height: 100%; overflow: hidden; 
            background: #000; flex-grow: 1; transition: 0.5s; 
        }
        .jdm-ss-media img { 
            width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.55); transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1); 
        }

        .jdm-ss-new-tag {
            position: absolute; top: 12px; left: 12px;
            font-size: 8px; font-weight: 900; background: var(--accent);
            color: #000; padding: 2px 8px; z-index: 2;
        }

        /* --- CARD BODY & INFO --- */
        .jdm-ss-body {
            padding: 18px;
            background: #0a0a0a;
            height: 115px;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .jdm-ss-meta-header { 
            display: flex; justify-content: space-between; 
            font-size: 9px; color: #555; text-transform: uppercase; margin-bottom: 8px;
        }

        .jdm-ss-title {
            font-family: 'Monument Extended', sans-serif !important;
            font-size: 12px; color: #fff; margin: 0;
            text-transform: uppercase; line-height: 1.2;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }

        .jdm-ss-details {
            font-size: 10px; color: #777; line-height: 1.5;
            max-height: 0; opacity: 0; overflow: hidden;
            transition: 0.4s; margin: 0; text-transform: uppercase;
        }
        .jdm-ss-details b { color: var(--accent); }

        .jdm-ss-footer {
            display: flex; justify-content: space-between; align-items: flex-end;
            padding-top: 10px; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.05);
        }

        .jdm-ss-btn { font-size: 10px; color: #444; font-weight: 900; }
        .jdm-ss-arrow { color: #444; transition: 0.4s; }

        /* --- HOVER EFFECTS --- */
        .jdm-ss-card:hover .jdm-ss-media { height: 40%; flex-grow: 0; }
        .jdm-ss-card:hover .jdm-ss-body { height: 60%; }
        .jdm-ss-card:hover img { filter: brightness(0.3) blur(2px); transform: scale(1.05); }
        .jdm-ss-card:hover .jdm-ss-details { max-height: 100px; opacity: 1; margin: 12px 0; }
        .jdm-ss-card:hover .jdm-ss-btn { color: var(--accent); }
        .jdm-ss-card:hover .jdm-ss-arrow { color: var(--accent); transform: translate(3px, -3px); }

        .jdm-ss-bar { position: absolute; bottom: 0; left: 0; width: 0; height: 3px; background: var(--accent); transition: 0.5s; }
        .jdm-ss-card:hover .jdm-ss-bar { width: 100%; }

        /* --- RESPONSIVE TILES --- */
        .jdm-tile-tall { grid-column: span 4; grid-row: span 2; }
        .jdm-tile-wide { grid-column: span 8; grid-row: span 1; }
        .jdm-tile-sm   { grid-column: span 4; grid-row: span 1; }

        @media (max-width: 1024px) {
            .jdm-ss-mosaic { grid-template-columns: repeat(2, 1fr); }
            [class*="jdm-tile-"] { grid-column: span 1 !important; grid-row: span 1 !important; height: 380px; }
        }
        @media (max-width: 768px) {
            .bt-magazine-header { padding-top: 40px; }
            .jdm-ss-mosaic { grid-template-columns: 1fr; }
            [class*="jdm-tile-"] { height: 450px; }
        }
    </style>
</head>
<body>

<div id="ottani-archive-root">
    <header class="bt-magazine-header">
        <div class="bt-brand-stack">
            <h1 class="bt-title-main">GALLERY</h1>
            <h1 class="bt-title-outline">ARCHIVE</h1>
        </div>
        <div class="bt-full-divider"></div>
        <p class="bt-editorial-text">
            REAL-TIME <b>JDM VISUALS</b>, ARCHIVING GLOBAL <b>CAR CULTURE</b> THROUGH CONTINUOUS <b>DIGITAL MOTION</b>.
        </p>
    </header>

    <div class="jdm-ss-mosaic" id="jdm-engine-grid"></div>
    <div id="jdm-load-more-trigger" style="height: 100px;"></div>
</div>

<script>
(function() {
    const KEYS = { 
        U: "1yLiYWVhE_HAY7MxFPGo3B4-9WfzmWj1R-VPaBTbNVA", 
        P: "2xbI4WF3YWnE66DEPr6gEJCNh4iuMyknemXRxw8WAanVE3kSMflm0KmD" 
    };
    let page = 1, fetching = false, counter = 0;

    // RECYCLE ENGINE (MEMORY MANAGEMENT)
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => {
            const img = e.target.querySelector('img');
            if (e.isIntersecting) {
                if (img.dataset.src) img.src = img.dataset.src;
                e.target.style.opacity = 1;
            } else {
                img.src = ''; 
            }
        });
    }, { rootMargin: '400px' });

    async function load() {
        if (fetching) return; fetching = true;
        const q = "jdm tuning car street night";
        try {
            const res = await Promise.allSettled([
                fetch(`https://api.unsplash.com/search/photos?page=${page}&query=${q}&client_id=${KEYS.U}`).then(r => r.json()),
                fetch(`https://api.pexels.com/v1/search?query=${q}&per_page=12&page=${page}`, {headers:{Authorization:KEYS.P}}).then(r => r.json())
            ]);

            const grid = document.getElementById('jdm-engine-grid');
            res.forEach((r, i) => {
                if (r.status === 'fulfilled') {
                    const data = i === 0 ? r.value.results : r.value.photos;
                    data.forEach(item => {
                        const info = {
                            img: i === 0 ? item.urls.regular : item.src.large,
                            title: (i === 0 ? item.alt_description : item.alt) || "JDM_ASSET",
                            author: i === 0 ? item.user.name : item.photographer,
                            source: i === 0 ? "UNSPLASH" : "PEXELS",
                            url: i === 0 ? item.links.html : item.url,
                            date: "2026_APR"
                        };
                        grid.appendChild(createCard(info));
                    });
                }
            });
            page++;
        } finally { fetching = false; }
    }

    function createCard(d) {
        const idx = counter % 4;
        const style = (idx === 0) ? 'jdm-tile-tall' : (idx === 1) ? 'jdm-tile-wide' : 'jdm-tile-sm';
        const a = document.createElement('a');
        a.className = `jdm-ss-card ${style}`;
        a.href = d.url; a.target = "_blank";
        a.style.opacity = 0;
        
        a.innerHTML = `
            <div class="jdm-ss-media">
                <img data-src="${d.img}" src="">
                <div class="jdm-ss-new-tag">100 OTTANI</div>
            </div>
            <div class="jdm-ss-body">
                <div class="jdm-ss-meta-header">
                    <span>SOURCE: ${d.source}</span>
                    <span>${d.date}</span>
                </div>
                <h3 class="jdm-ss-title">${d.title}</h3>
                <div class="jdm-ss-details">
                    <b>AUTHOR:</b> ${d.author}<br>
                    <b>STATUS:</b> VERIFIED ARCHIVE<br>
                    <b>SOURCE:</b> ${d.source}
                </div>
                <div class="jdm-ss-footer">
                    <span class="jdm-ss-btn">VIEW_ASSET</span>
                    <svg class="jdm-ss-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <line x1="7" y1="17" x2="17" y2="7"></line>
                        <polyline points="7 7 17 7 17 17"></polyline>
                    </svg>
                </div>
                <div class="jdm-ss-bar"></div>
            </div>
        `;
        counter++;
        observer.observe(a);
        return a;
    }

    const trigger = new IntersectionObserver(e => { if(e[0].isIntersecting) load(); });
    trigger.observe(document.getElementById('jdm-load-more-trigger'));

    // HEIGHT SYNC FOR FOURTHWALL
    const syncHeight = () => {
        window.parent.postMessage({ type: 'resize', height: document.documentElement.scrollHeight }, '*');
    };
    new ResizeObserver(syncHeight).observe(document.body);
    load();
})();
</script>
</body>
</html>
