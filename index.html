<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Ottani Please!™ | JDM Archive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        @font-face {
            font-family: 'Monument Extended';
            src: url('https://fonts.cdnfonts.com/s/19595/MonumentExtended-Ultrabold.woff');
            font-weight: 800;
        }

        html, body {
            margin: 0; padding: 0;
            background: transparent !important;
            color: #fff;
            overflow-x: hidden;
            font-family: 'JetBrains Mono', monospace;
            /* Ottimizzazione rendering */
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
        }

        #ottani-archive-root {
            width: 100%;
            padding: 0 30px;
            box-sizing: border-box;
            --accent: #FFFF00;
        }

        .jdm-ss-mosaic { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            grid-auto-rows: 300px;
            gap: 15px;
            grid-auto-flow: row;
        } 

        .jdm-ss-card {
            background: #0a0a0a; border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none; position: relative; overflow: hidden;
            /* Forza l'uso della GPU */
            backface-visibility: hidden;
            transform: translateZ(0);
            will-change: transform, border-color;
        }

        .jdm-ss-media { width: 100%; height: 100%; overflow: hidden; }
        
        /* Immagini fluide ma ottimizzate */
        .jdm-ss-media img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            filter: brightness(0.7); 
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1), filter 0.6s;
            will-change: transform, filter;
        }

        .jdm-ss-body {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 15px; box-sizing: border-box; background: #0a0a0a;
            transform: translateY(101%); opacity: 0;
            transition: transform 0.4s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.4s;
            z-index: 3;
            will-change: transform, opacity;
        }

        .jdm-ss-card:hover .jdm-ss-body { transform: translateY(0); opacity: 1; }
        .jdm-ss-card:hover img { filter: brightness(0.3) grayscale(1); transform: scale(1.05); }

        /* Pattern Rigidi */
        .full { grid-column: span 12; }
        .wide { grid-column: span 8; }
        .narrow { grid-column: span 4; }

        @media (max-width: 1024px) { 
            .jdm-ss-mosaic { grid-auto-rows: 350px; }
            [class*="wide"], [class*="narrow"], [class*="full"] { grid-column: span 12 !important; } 
        }

        /* Stili testi */
        .jdm-ss-meta-header { display: flex; justify-content: space-between; font-size: 8px; color: #555; text-transform: uppercase; margin-bottom: 6px; }
        .jdm-ss-title { font-family: 'Monument Extended', sans-serif !important; font-size: 10px; color: #fff; margin: 0; text-transform: uppercase; }
        .jdm-ss-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 8px; margin-top: 10px; }
        .jdm-ss-tag { font-size: 8px; color: var(--accent); font-weight: 800; }
        .jdm-ss-action { font-size: 9px; color: #444; font-weight: 900; }
        .jdm-ss-card:hover .jdm-ss-action { color: var(--accent); }
    </style>
</head>
<body>

<div id="ottani-archive-root">
    <main class="jdm-ss-mosaic" id="jdm-engine-grid"></main>
    <div id="jdm-load-more-trigger" style="height: 20px;"></div>
</div>

<script>
(function() {
    const KEYS = { U: "1yLiYWVhE_HAY7MxFPGo3B4-9WfzmWj1R-VPaBTbNVA", P: "2xbI4WF3YWnE66DEPr6gEJCNh4iuMyknemXRxw8WAanVE3kSMflm0KmD" };
    let page = 1, fetching = false, counter = 0;

    const patternA = ['full', 'wide', 'narrow', 'narrow', 'wide', 'full'];
    const patternB = ['wide', 'narrow', 'full', 'narrow', 'wide', 'full'];

    async function load() {
        if (fetching) return; fetching = true;
        try {
            const q = "jdm performance cars tuning";
            const res = await Promise.allSettled([
                fetch(`https://api.unsplash.com/search/photos?page=${page}&query=${q}&client_id=${KEYS.U}`).then(r => r.json()),
                fetch(`https://api.pexels.com/v1/search?query=${q}&per_page=12&page=${page}`, {headers:{Authorization:KEYS.P}}).then(r => r.json())
            ]);

            const grid = document.getElementById('jdm-engine-grid');
            res.forEach((r, i) => {
                if (r.status === 'fulfilled') {
                    const data = i === 0 ? (r.value.results || []) : (r.value.photos || []);
                    data.forEach(item => {
                        const info = {
                            img: i === 0 ? item.urls.regular + "&q=75&w=1000" : item.src.large, // Riduce qualità per velocità
                            title: (i === 0 ? (item.alt_description || item.description) : item.alt) || "JDM VISUAL",
                            author: i === 0 ? item.user.name : item.photographer,
                            source: i === 0 ? "UNSPLASH" : "PEXELS",
                            url: i === 0 ? item.links.html : item.url
                        };
                        grid.appendChild(createCard(info));
                    });
                }
            });
            page++;
        } finally { fetching = false; }
    }

    function createCard(d) {
        const pattern = (Math.floor(counter / 6) % 2 === 0) ? patternA : patternB;
        const style = pattern[counter % 6];
        counter++;

        const a = document.createElement('a');
        a.className = `jdm-ss-card ${style}`;
        a.href = d.url; a.target = "_blank";
        a.innerHTML = `
            <div class="jdm-ss-media"><img src="${d.img}" loading="lazy" decoding="async"></div>
            <div class="jdm-ss-body">
                <div class="jdm-ss-meta-header"><span>${d.source}</span><span>17/04/26</span></div>
                <h2 class="jdm-ss-title">${d.title}</h2>
                <div class="jdm-ss-footer">
                    <span class="jdm-ss-tag">#JDM_CORE</span>
                    <span class="jdm-ss-action">VIEW ↗</span>
                </div>
            </div>
        `;
        return a;
    }

    // Caricamento infinito fluido
    const observer = new IntersectionObserver(e => { if(e[0].isIntersecting) load(); }, { rootMargin: '400px' });
    observer.observe(document.getElementById('jdm-load-more-trigger'));
    
    // Sync Fourthwall ottimizzato (Debounced)
    let timeout;
    const sync = () => {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
            window.parent.postMessage({ type: 'resize', height: document.documentElement.scrollHeight }, '*');
        }, 150);
    };
    new ResizeObserver(sync).observe(document.body);
    load();
})();
</script>
</body>
</html>
