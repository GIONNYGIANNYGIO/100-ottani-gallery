<section style="background: transparent; padding: 40px 0; width: 100%;">

<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');

body {
    margin:0;
    background:transparent;
    font-family:'JetBrains Mono', monospace;
}

/* CONTAINER */
.gallery-container {
    padding: 0 30px;
}

@media (max-width:768px){
    .gallery-container{
        padding:0 15px;
    }
}

/* MASONRY */
.gallery {
    column-count: 4;
    column-gap: 15px;
}

@media (max-width:1200px){ .gallery{ column-count:3; } }
@media (max-width:768px){ .gallery{ column-count:2; } }
@media (max-width:480px){ .gallery{ column-count:1; } }

/* CARD */
.card {
    position: relative;
    margin-bottom: 15px;
    break-inside: avoid;
    overflow: hidden;
    cursor: pointer;
}

.card img {
    width:100%;
    display:block;
    transition:0.6s;
}

/* OVERLAY (like your code) */
.overlay {
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:#0a0a0a;
    color:white;
    padding:20px;
    transform: translateY(100%);
    transition:0.5s cubic-bezier(0.19, 1, 0.22, 1);
}

/* HOVER EFFECT */
.card:hover img {
    transform:scale(1.08);
    filter:brightness(0.4);
}

.card:hover .overlay {
    transform: translateY(0);
}

/* TEXT */
.meta {
    font-size:10px;
    color:#666;
    margin-bottom:10px;
}

.title {
    font-size:14px;
    font-weight:800;
    margin-bottom:10px;
    text-transform:uppercase;
}

.desc {
    font-size:11px;
    color:#aaa;
    margin-bottom:12px;
}

/* TAGS + ARROW */
.footer {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.tags {
    display:flex;
    gap:6px;
}

.tag {
    font-size:10px;
    color:#FFFF00;
    font-weight:800;
}

.arrow {
    width:16px;
    height:16px;
    border:2px solid #333;
    transform: rotate(45deg);
    transition:0.3s;
}

.card:hover .arrow {
    border-color:#FFFF00;
    transform: rotate(45deg) translate(3px,-3px);
}

/* LOADER */
.loader {
    display:flex;
    justify-content:center;
    padding:40px 0;
}

.spinner {
    width:30px;
    height:30px;
    border:3px solid rgba(255,255,255,0.1);
    border-top-color:#FFFF00;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform:rotate(360deg); }
}

/* EXTRA SPACE BOTTOM */
.bottom-space {
    height:150px;
}
</style>

<div class="gallery-container">
    <div id="gallery" class="gallery"></div>
    <div id="loader" class="loader"><div class="spinner"></div></div>
    <div id="trigger"></div>
    <div class="bottom-space"></div>
</div>

<script>
const MAX_IMAGES = 200;
const BATCH = 20;

let page = 1;
let loading = false;
let totalLoaded = 0;

function createCard(img){
    const el = document.createElement("a");
    el.className = "card";
    el.href = img.link;
    el.target = "_blank";

    el.innerHTML = `
        <img src="${img.url}" alt="${img.title}" loading="lazy">
        <div class="overlay">
            <div class="meta">Author: ${img.author}</div>
            <div class="meta">Source: ${img.source}</div>
            <div class="title">${img.title}</div>
            <div class="desc">${img.desc}</div>
            <div class="footer">
                <div class="tags">
                    ${img.tags.map(t=>`<span class="tag">#${t}</span>`).join("")}
                </div>
                <div class="arrow"></div>
            </div>
        </div>
    `;
    return el;
}

async function fetchImages(){
    if(loading || totalLoaded >= MAX_IMAGES) return;
    loading = true;
    document.getElementById("loader").style.display="flex";

    try{
        const res = await fetch(`https://api.unsplash.com/search/photos?page=${page}&per_page=${BATCH}&query=car tuning real modified cars jdm street car meet&client_id=1yLiYWVhE_HAY7MxFPGo3B4-9WfzmWj1R-VPaBTbNVA`);
        const data = await res.json();

        data.results.forEach(img=>{
            if(totalLoaded >= MAX_IMAGES) return;

            const card = createCard({
                url: img.urls.small,
                title: img.alt_description || "Tuned Car",
                desc: "Real modified street car",
                author: img.user.name,
                source: "Unsplash",
                link: img.links.html,
                tags: ["JDM","TUNING","REAL"]
            });

            document.getElementById("gallery").appendChild(card);
            totalLoaded++;
        });

        page++;

    } catch(e){
        console.log(e);
    }

    loading = false;
    document.getElementById("loader").style.display="none";
}

/* SCROLL LOAD */
const observer = new IntersectionObserver(entries=>{
    if(entries[0].isIntersecting){
        fetchImages();
    }
},{threshold:0.1});

observer.observe(document.getElementById("trigger"));

fetchImages();
</script>

</section>
