<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>100 Octane Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:transparent;
    font-family:'JetBrains Mono', monospace;
}

/* CONTAINER */
.container{
    padding:0 30px;
}

/* MASONRY */
.masonry{
    column-count:4;
    column-gap:15px;
}

@media (max-width:1024px){
    .masonry{ column-count:2; }
}

@media (max-width:768px){
    .container{ padding:0 15px; }
    .masonry{ column-count:1; }
}

/* CARD */
.card{
    break-inside:avoid;
    margin-bottom:15px;
    position:relative;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.08);
    transition:0.4s;
}

.card:hover{
    border-color:#FFFF00;
}

/* IMG */
.card img{
    width:100%;
    display:block;
    filter:brightness(0.6);
    transition:0.6s;
}

.card:hover img{
    transform:scale(1.1);
    filter:brightness(0.3);
}

/* OVERLAY */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    padding:20px;

    background:linear-gradient(to top, rgba(0,0,0,0.95), transparent);

    opacity:0;
    transform:translateY(30px);
    transition:0.4s;
}

.card:hover .overlay{
    opacity:1;
    transform:translateY(0);
}

/* META */
.meta{
    font-size:10px;
    color:#aaa;
    margin-bottom:8px;
}

/* FOOTER */
.footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* TAGS */
.tags{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

.tag{
    font-size:10px;
    color:#FFFF00;
    font-weight:800;
}

/* ARROW */
.arrow{
    color:#555;
    transition:0.3s;
}

.card:hover .arrow{
    color:#FFFF00;
    transform:translate(3px,-3px);
}

/* BAR */
.bar{
    position:absolute;
    bottom:0;
    left:0;
    height:3px;
    width:0;
    background:#FFFF00;
    transition:0.4s;
}

.card:hover .bar{
    width:100%;
}

/* LOADER */
.loader{
    display:flex;
    justify-content:center;
    padding:40px 0;
}

.spinner{
    width:30px;
    height:30px;
    border:3px solid rgba(255,255,255,0.1);
    border-top-color:#FFFF00;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
}

@keyframes spin{
    to{ transform:rotate(360deg); }
}

</style>
</head>

<body>

<div class="container">
    <div id="grid" class="masonry"></div>

    <div id="loader" class="loader">
        <div class="spinner"></div>
    </div>

    <div id="trigger" style="height:50px;"></div>
</div>

<script>

let data = [];
let index = 0;
const STEP = 20;
let loading = false;

function tags(url){
    url=url.toLowerCase();
    const t=[];
    if(url.includes("jdm")) t.push("JDM");
    if(url.includes("drift")) t.push("DRIFT");
    if(url.includes("stance")) t.push("STANCE");
    if(t.length===0) t.push("TUNING");
    return t;
}

async function init(){
    const res = await fetch("gallery.json");
    data = await res.json();
    load();
}

function load(){
    if(loading) return;
    loading=true;

    const grid=document.getElementById("grid");
    const loader=document.getElementById("loader");

    loader.style.display="flex";

    setTimeout(()=>{

        for(let i=0;i<STEP && index<data.length;i++,index++){

            const img=data[index];

            const el=document.createElement("a");
            el.href=img.url;
            el.target="_blank";
            el.className="card";

            el.innerHTML=`
                <img src="${img.url}" loading="lazy">

                <div class="overlay">
                    <div class="meta">
                        Author: ${img.author || "Unknown"}<br>
                        Source: ${img.source || ""}
                    </div>

                    <div class="footer">
                        <div class="tags">
                            ${tags(img.url).map(t=>`<span class="tag">#${t}</span>`).join("")}
                        </div>

                        <svg class="arrow" viewBox="0 0 24 24" width="16" fill="none" stroke="currentColor" stroke-width="3">
                            <line x1="7" y1="17" x2="17" y2="7"></line>
                            <polyline points="7 7 17 7 17 17"></polyline>
                        </svg>
                    </div>

                    <div class="bar"></div>
                </div>
            `;

            grid.appendChild(el);
        }

        loader.style.display="none";
        loading=false;

    },300);
}

/* SCROLL */
const observer=new IntersectionObserver(e=>{
    if(e[0].isIntersecting && index<data.length){
        load();
    }
});

observer.observe(document.getElementById("trigger"));

init();

</script>

</body>
</html>
